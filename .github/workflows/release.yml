name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: subout
            archive_name: subout-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bin_name: subout
            archive_name: subout-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: subout
            archive_name: subout-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: subout
            archive_name: subout-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: subout.exe
            archive_name: subout-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bin_name: subout.exe
            archive_name: subout-${{ github.ref_name }}-aarch64-pc-windows-msvc.zip

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Web UI
        run: |
          cd web
          npm install
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup cross toolchain (Linux MUSL)
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Codesign binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          codesign --force --verbose --sign - target/${{ matrix.target }}/release/${{ matrix.bin_name }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf "${{ github.workspace }}/${{ matrix.archive_name }}" -C "target/${{ matrix.target }}/release" "${{ matrix.bin_name }}"

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path ${{ matrix.bin_name }} -DestinationPath "${{ github.workspace }}\${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true

